<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Career Portal | Holistic Development</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Global Navigation -->
    <header id="main-header" style="display: none;">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">✦</span>
                <h1>CareerPortal</h1>
            </div>
            <nav id="top-nav">
                <!-- Dynamic based on role -->
            </nav>
            <div class="user-profile">
                <span id="user-display-email"></span>
                <button class="btn-icon" onclick="logout()" title="Logout">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- App View Container -->
    <main id="app-root">
        <!-- Views injected here by app.js -->
        <div class="loader-wrapper" id="global-loader">
            <div class="loader"></div>
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
